name: Notify Release

on:
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Latest Release Details
        id: release
        run: |
          TARGET_REPO="frostnova721/animestream"  # Change this to the correct repository

          RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/$TARGET_REPO/releases/latest")

          LATEST_TAG=$(echo "$RELEASE_DATA" | jq -r '.tag_name')
          RELEASE_NOTES=$(echo "$RELEASE_DATA" | jq -r '.body')
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo "$RELEASE_NOTES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Get and Categorize Assets
        id: assets
        run: |
          TARGET_REPO="owner/repo"  # Change this to the correct repository

          APK_LINK=""
          EXE_LINK=""
          
          ASSETS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
           "https://api.github.com/repos/$TARGET_REPO/releases/latest" | jq -r '.assets[] | "\(.browser_download_url) \(.name)"')

          while read -r ASSET_URL FILE_NAME; do
            if [[ "$FILE_NAME" == *.apk ]]; then
              APK_LINK="📱 <a href='$ASSET_URL'>$FILE_NAME</a>"
            elif [[ "$FILE_NAME" == *.exe ]]; then
              EXE_LINK="🖥 <a href='$ASSET_URL'>$FILE_NAME</a>"
            fi
          done <<< "$ASSETS"

          echo "APK_LINK=$APK_LINK" >> $GITHUB_ENV
          echo "EXE_LINK=$EXE_LINK" >> $GITHUB_ENV

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" -X POST -d '{
            "username": "Release Notifier",
            "embeds": [{
              "title": "🚀 New Release: '${{ env.LATEST_TAG }}'",
              "description": "'"${{ env.RELEASE_NOTES }}"'\n\n**📂 Assets:**\n📱 APK: [Download](${{ env.APK_LINK }})\n🖥 EXE: [Download](${{ env.EXE_LINK }})",
              "url": "https://github.com/owner/repo/releases/tag/${{ env.LATEST_TAG }}"
            }]
          }' $DISCORD_WEBHOOK_URL

      - name: Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="<b>🚀 New Release: ${{ env.LATEST_TAG }}</b>\n\n${{ env.RELEASE_NOTES }}\n\n<b>📂 Assets:</b>\n${{ env.APK_LINK }}\n${{ env.EXE_LINK }}\n\n📌 <a href='https://github.com/owner/repo/releases/tag/${{ env.LATEST_TAG }}'>Full changelog</a>"
          
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode="HTML" \
            -d text="$MESSAGE"
